<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#059669">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="페이롤">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192x192.png">
<title>페이롤 영어</title>
<style>
:root{--gr:#059669;--gl:#ecfdf5;--gm:#a7f3d0;--gd:#047857;--text:#1a1a1a;--mu:#6b7280;--hi:#9ca3af;--bg:#f9fafb;--card:#fff;--r:20px;--rs:12px;--nav:60px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overscroll-behavior:none}
.app{max-width:430px;margin:0 auto;padding:0 20px calc(var(--nav) + env(safe-area-inset-bottom) + 20px)}
.page{display:none}.page.active{display:block}
.hdr{padding:calc(env(safe-area-inset-top)+18px) 0 14px}
.hdr h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
.hdr p{font-size:13px;color:var(--mu);margin-top:3px}
.tabs{display:flex;gap:6px;margin-bottom:14px;background:#f3f4f6;border-radius:12px;padding:4px}
.tib{flex:1;padding:8px;border:none;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;background:none;color:var(--mu)}
.tib.on{background:white;color:var(--gd);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.pb{height:4px;background:#e5e7eb;border-radius:2px;margin-bottom:14px;overflow:hidden}
.pf{height:100%;background:var(--gr);border-radius:2px;transition:width .3s}
.card{background:var(--card);border-radius:var(--r);padding:22px 20px;margin-bottom:14px;border:1px solid #e5e7eb}
.badge{display:inline-block;background:var(--gl);color:var(--gd);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;margin-bottom:10px}
.cnum{font-size:12px;color:var(--hi);margin-bottom:8px}
.ckr{font-size:19px;font-weight:700;line-height:1.4;margin-bottom:14px}
.cen{font-size:16px;color:var(--gd);font-weight:600;line-height:1.5;background:var(--gl);padding:12px 14px;border-radius:var(--rs);display:none}
.cen.show{display:block}
.fbtn{width:100%;padding:13px;background:var(--gr);color:white;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;margin-top:14px}
.fbtn:active{opacity:.88}
.nrow{display:flex;gap:8px}
.nbtn{flex:1;padding:11px;border:1.5px solid #e5e7eb;background:white;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;color:var(--mu)}
.nbtn:active{transform:scale(.97)}
.nbtn.ok{border-color:#10b981;color:#10b981}
.nbtn.ng{border-color:#ef4444;color:#ef4444}
.ecard{background:white;border:1px solid #e5e7eb;border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.ehdr{padding:14px 16px;background:var(--gl);border-bottom:1px solid var(--gm)}
.esit{font-size:11px;color:var(--gd);font-weight:700;margin-bottom:3px}
.esubj{font-size:14px;font-weight:700;color:var(--text)}
.ebody{padding:14px 16px;font-size:13px;line-height:1.8;color:var(--text);white-space:pre-line}
.ephrs{padding:10px 16px;border-top:1px solid #f3f4f6}
.eptit{font-size:11px;font-weight:700;color:var(--gd);margin-bottom:6px}
.etag{display:inline-block;background:var(--gl);color:var(--gd);font-size:12px;padding:3px 9px;border-radius:20px;margin:2px;font-style:italic}
.enav{display:flex;gap:8px;padding:10px 16px;border-top:1px solid #f3f4f6}
.enav button{flex:1;padding:9px;border:1.5px solid #e5e7eb;background:white;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;color:var(--mu)}
.dcard{background:white;border:1px solid #e5e7eb;border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.dhdr{padding:12px 16px;background:#f8fafc;border-bottom:1px solid #e5e7eb;font-size:13px;font-weight:700}
.dbody{padding:14px 16px}
.dline{margin-bottom:14px}
.dspk{font-size:11px;font-weight:700;color:var(--gd);margin-bottom:3px}
.dkr{font-size:13px;color:var(--mu);margin-bottom:3px}
.den{font-size:15px;font-weight:600;color:var(--text);line-height:1.4;cursor:pointer;transition:filter .2s}
.den.blr{filter:blur(5px)}
.rvbtn{width:calc(100% - 32px);margin:0 16px 12px;padding:10px;border:1.5px solid var(--gr);background:var(--gl);color:var(--gd);border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer}
.dnav{display:flex;gap:8px;padding:0 16px 12px}
.dnav button{flex:1;padding:9px;border:1.5px solid #e5e7eb;background:white;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;color:var(--mu)}
.srow{display:flex;gap:10px;margin-bottom:16px}
.sc{flex:1;background:white;border:1px solid #e5e7eb;border-radius:var(--rs);padding:14px;text-align:center}
.sn{font-size:24px;font-weight:800;color:var(--gr)}
.sl{font-size:11px;color:var(--hi);margin-top:2px}
.tnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:white;border-top:1px solid #e5e7eb;display:flex;height:var(--nav);padding-bottom:env(safe-area-inset-bottom)}
.tbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;cursor:pointer;font-size:10px;font-weight:500;color:var(--hi)}
.tbtn .ti{font-size:22px}
.tbtn.on{color:var(--gr)}
.toast{position:fixed;bottom:calc(var(--nav) + env(safe-area-inset-bottom) + 12px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:white;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="page active" id="pgLearn">
    <div class="hdr"><h1>페이롤 영어 💼</h1><p>급여 실무 영어 완전 정복 · 209개 용어</p></div>
    <div class="tabs">
      <button class="tib on" id="mFlash">용어 카드</button>
      <button class="tib" id="mEmail">이메일</button>
      <button class="tib" id="mDialog">대화</button>
    </div>
    <div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
    <div id="secFlash">
      <div class="card">
        <div class="badge" id="fcBadge"></div>
        <div class="cnum" id="fcNum"></div>
        <div class="ckr" id="fcKr"></div>
        <div class="cen" id="fcEn"></div>
        <button class="fbtn" id="flipBtn">영어로 보기 👆</button>
        <div class="nrow" id="fcNav" style="display:none">
          <button class="nbtn ng" id="btnWrong">❌ 몰랐어</button>
          <button class="nbtn ok" id="btnRight">✅ 알았어</button>
        </div>
      </div>
    </div>
    <div id="secEmail" style="display:none">
      <div class="ecard">
        <div class="ehdr"><div class="esit" id="eSit"></div><div class="esubj" id="eSubj"></div></div>
        <div class="ebody" id="eBody"></div>
        <div class="ephrs"><div class="eptit">🔑 핵심 표현</div><div id="ePhrases"></div></div>
        <div class="enav"><button id="ePrev">← 이전</button><button id="eNext">다음 →</button></div>
      </div>
    </div>
    <div id="secDialog" style="display:none">
      <div class="dcard">
        <div class="dhdr" id="dSit"></div>
        <div class="dbody" id="dBody"></div>
        <button class="rvbtn" id="rvBtn">영어 전체 보기 👁</button>
        <div class="dnav"><button id="dPrev">← 이전</button><button id="dNext">다음 →</button></div>
      </div>
    </div>
  </div>
  <div class="page" id="pgStats">
    <div class="hdr"><h1>내 기록 📊</h1></div>
    <div class="srow">
      <div class="sc"><div class="sn" id="stOk">0</div><div class="sl">맞힌 수</div></div>
      <div class="sc"><div class="sn" id="stTot">0</div><div class="sl">푼 문제</div></div>
      <div class="sc"><div class="sn" id="stPct">0%</div><div class="sl">정답률</div></div>
    </div>
    <div style="background:white;border:1px solid #e5e7eb;border-radius:var(--rs);padding:16px">
      <div style="font-size:13px;font-weight:600;color:var(--mu);margin-bottom:8px">학습 순서 추천</div>
      <div style="font-size:13px;color:var(--text);line-height:1.8">1️⃣ 용어 카드로 기본 개념 익히기<br>2️⃣ 이메일로 실제 문장 패턴 익히기<br>3️⃣ 대화로 실무 상황 연습하기</div>
    </div>
  </div>
</div>
<nav class="tnav">
  <button class="tbtn on" id="tabLearn"><span class="ti">📖</span>학습</button>
  <button class="tbtn" id="tabStats"><span class="ti">📊</span>기록</button>
</nav>
<div class="toast" id="toast"></div>

var EMAILS=[{"situation": "급여 처리 완료 안내", "subject": "Payroll Processed – [Month] [Year]", "body": "Dear [Employee Name],\n\nI hope this message finds you well.\n\nI'm writing to let you know that payroll for [Month] has been successfully processed. Your net pay of [amount] will be deposited into your account on [pay date].\n\nPlease review your pay stub attached to this email. If you notice any discrepancies, don't hesitate to reach out.\n\nBest regards,\n[Your Name]\nHR / Payroll Team", "key_phrases": ["successfully processed", "deposited into your account", "discrepancies", "don't hesitate to reach out"]}, {"situation": "공제 내역 안내", "subject": "Deduction Breakdown for [Month]", "body": "Hi [Employee Name],\n\nPlease find below the deduction breakdown for your [Month] paycheck:\n\n- National Pension: [amount]\n- Health Insurance: [amount]\n- Employment Insurance: [amount]\n- Income Tax (withholding): [amount]\n\nTotal Deductions: [amount]\nNet Pay: [amount]\n\nIf you have any questions regarding your deductions, feel free to contact me directly.\n\nBest,\n[Your Name]", "key_phrases": ["deduction breakdown", "withholding", "net pay", "feel free to contact"]}, {"situation": "급여 오류 수정 안내", "subject": "Payroll Correction Notice – [Month]", "body": "Dear [Employee Name],\n\nWe sincerely apologize for the error in your [Month] payroll.\n\nUpon review, we identified an incorrect calculation in your [overtime pay / allowance / deduction]. The corrected amount of [amount] will be reflected in your next pay cycle, or we can process a separate payment if needed.\n\nWe take payroll accuracy very seriously and are taking steps to prevent this from happening again. Please let me know if you have any concerns.\n\nBest regards,\n[Your Name]", "key_phrases": ["sincerely apologize", "identified an incorrect calculation", "reflected in your next pay cycle", "payroll accuracy"]}, {"situation": "연봉 인상 안내", "subject": "Salary Adjustment Notification", "body": "Dear [Employee Name],\n\nI'm pleased to inform you that your salary has been adjusted effective [date].\n\nYour new annual salary will be [amount], reflecting a [X]% increase from your previous compensation. This adjustment has been approved in recognition of your continued contributions to the team.\n\nYour updated salary will be reflected starting with the [Month] payroll. Please sign and return the attached salary agreement at your earliest convenience.\n\nWarm regards,\n[Your Name]", "key_phrases": ["effective [date]", "reflecting a X% increase", "in recognition of", "at your earliest convenience"]}, {"situation": "4대보험 가입 안내", "subject": "Social Insurance Enrollment Confirmation", "body": "Hi [Employee Name],\n\nWelcome to the team! This is to confirm that you have been enrolled in Korea's four major social insurance programs, effective [start date]:\n\n1. National Pension (국민연금)\n2. Health Insurance (건강보험)\n3. Employment Insurance (고용보험)\n4. Workers' Compensation (산재보험)\n\nYour monthly premiums will be automatically deducted from your payroll. Please find the detailed breakdown in the attached document. If you have any questions, feel free to reach out anytime.\n\nBest,\n[Your Name]", "key_phrases": ["enrolled in", "effective", "automatically deducted", "detailed breakdown"]}, {"situation": "퇴직금 정산 안내", "subject": "Severance Pay Settlement – [Employee Name]", "body": "Dear [Employee Name],\n\nAs your employment with [Company] concludes on [last working day], we would like to outline the severance pay process.\n\nBased on your length of service ([X] years [X] months), your severance pay has been calculated as follows:\n\n- Average monthly wage: [amount]\n- Service period: [X] months\n- Total severance pay: [amount]\n\nThe payment will be made to your registered bank account within 14 days of your last working day, in accordance with Korean labor law.\n\nPlease don't hesitate to contact us if you need any clarification.\n\nBest regards,\n[Your Name]", "key_phrases": ["concludes on", "length of service", "in accordance with", "within 14 days"]}, {"situation": "연말정산 안내", "subject": "Year-End Tax Settlement – Required Documents", "body": "Dear All,\n\nIt's that time of year again — please note that year-end tax settlement (연말정산) is due by [date].\n\nTo complete the process, please submit the following documents by [deadline]:\n\n- Certificate of insurance premiums paid\n- Medical expense receipts\n- Education expense receipts\n- Donation receipts (if applicable)\n- Dependent information (name, ID number)\n\nDocuments can be submitted via [system/email/in-person]. If you have any questions, please reach out to the HR team.\n\nThank you for your cooperation.\n\nBest,\n[Your Name]", "key_phrases": ["year-end tax settlement", "submit the following documents", "by [deadline]", "thank you for your cooperation"]}, {"situation": "육아휴직 신청 승인", "subject": "Parental Leave Approval – [Employee Name]", "body": "Dear [Employee Name],\n\nI'm writing to confirm that your parental leave request has been approved.\n\nLeave period: [Start Date] – [End Date]\nDuration: [X] weeks / months\n\nDuring your leave, your position will be covered by [name / temp staff]. Please ensure a proper handover is completed before your last working day.\n\nYour return date is scheduled for [date]. We'll be in touch closer to your return to discuss any necessary arrangements.\n\nWishing you and your family all the best during this special time.\n\nWarm regards,\n[Your Name]", "key_phrases": ["parental leave request has been approved", "handover", "return date is scheduled", "all the best"]}, {"situation": "보험료율 변경 공지", "subject": "Update: Insurance Premium Rate Changes Effective [Date]", "body": "Dear Team,\n\nPlease be informed that the national insurance premium rates will be updated effective [date], as announced by the relevant government authorities.\n\nThe updated rates are as follows:\n\nNational Pension: [X]% (employee share: [X]%)\nHealth Insurance: [X]% (employee share: [X]%)\nEmployment Insurance: [X]% (employee share: [X]%)\n\nThese changes will be reflected in your [Month] payroll. Your updated pay stub will show the revised deductions.\n\nPlease contact HR if you have any questions.\n\nBest,\n[Your Name]", "key_phrases": ["effective [date]", "updated rates", "reflected in your payroll", "revised deductions"]}, {"situation": "급여 계좌 변경 요청", "subject": "Bank Account Update Required", "body": "Dear [Employee Name],\n\nWe noticed that the bank account on file for your payroll may need to be updated.\n\nTo ensure your salary is deposited correctly, please provide the following information by [date]:\n\n- Bank name\n- Account holder name\n- Account number\n\nYou can submit this via [email / HR portal / in person]. Please note that changes submitted after [cutoff date] will be applied starting the following pay period.\n\nThank you for your prompt attention.\n\nBest,\n[Your Name]", "key_phrases": ["on file", "deposited correctly", "cutoff date", "prompt attention"]}, {"situation": "연차 잔여일 안내", "subject": "Reminder: Remaining Annual Leave Balance", "body": "Dear [Employee Name],\n\nThis is a friendly reminder that you currently have [X] days of unused annual leave remaining.\n\nAs a reminder, unused leave must be taken by [expiration date]. Leave that is not used by this date will [expire / be paid out as annual leave allowance] in accordance with company policy.\n\nPlease plan your time off accordingly and submit your leave requests through [system / your manager].\n\nFeel free to reach out if you have any questions.\n\nBest,\n[Your Name]", "key_phrases": ["unused annual leave", "expiration date", "in accordance with company policy", "plan your time off"]}, {"situation": "수습 기간 종료 및 정규직 전환 안내", "subject": "Probationary Period Completion & Employment Confirmation", "body": "Dear [Employee Name],\n\nCongratulations! We are pleased to confirm that you have successfully completed your probationary period as of [date].\n\nEffective [date], you will transition to a permanent full-time position. Your updated employment terms are as follows:\n\n- Annual salary: [amount]\n- Benefits: [list key benefits]\n- Position: [job title]\n\nPlease review and sign the attached employment contract and return it to HR by [date].\n\nWe look forward to your continued growth with the team.\n\nBest regards,\n[Your Name]", "key_phrases": ["successfully completed your probationary period", "transition to a permanent full-time position", "employment terms", "continued growth"]}];
var DIALOGS=[{"situation": "급여 문의 전화", "lines": [{"speaker": "직원", "kr": "이번 달 급여가 평소보다 적게 들어온 것 같아서요.", "en": "It looks like my paycheck this month is lower than usual."}, {"speaker": "담당자", "kr": "잠깐만요, 확인해 드릴게요.", "en": "Let me pull that up for you."}, {"speaker": "담당자", "kr": "아, 이번 달에 결근 처리가 돼서 그 부분이 공제됐네요.", "en": "It looks like an absence was recorded, so that amount was deducted."}, {"speaker": "직원", "kr": "그게 실수인 것 같은데요, 저 그날 재택근무했거든요.", "en": "I think that might be a mistake — I was working from home that day."}, {"speaker": "담당자", "kr": "알겠습니다. 확인 후 다음 급여에 반영해 드리겠습니다.", "en": "Got it. I'll look into it and have it corrected in the next payroll."}]}, {"situation": "신입 직원 급여 안내", "lines": [{"speaker": "담당자", "kr": "저희 급여일은 매월 25일이에요.", "en": "Our payday is the 25th of every month."}, {"speaker": "신입", "kr": "첫 달도 25일에 나오나요?", "en": "Will I get paid on the 25th for my first month too?"}, {"speaker": "담당자", "kr": "네, 입사일 기준으로 일할 계산해서 드려요.", "en": "Yes, it'll be prorated based on your start date."}, {"speaker": "신입", "kr": "급여 명세서는 어떻게 받아요?", "en": "How do I receive my pay stub?"}, {"speaker": "담당자", "kr": "이메일로 보내드리고, 사내 포털에서도 확인 가능해요.", "en": "We'll email it to you, and you can also access it on the company portal."}]}, {"situation": "연봉 협상", "lines": [{"speaker": "직원", "kr": "연봉 조정 관련해서 말씀드리고 싶어서요.", "en": "I'd like to discuss a salary adjustment."}, {"speaker": "담당자", "kr": "어떤 부분을 염두에 두고 계신가요?", "en": "What did you have in mind?"}, {"speaker": "직원", "kr": "지난 1년 성과를 고려해서 10% 인상을 요청드리고 싶습니다.", "en": "Given my performance over the past year, I'd like to request a 10% raise."}, {"speaker": "담당자", "kr": "검토해 보고 답변 드릴게요. 일주일 정도 시간 주실 수 있나요?", "en": "Let me review it and get back to you. Can you give me about a week?"}, {"speaker": "직원", "kr": "물론입니다. 감사합니다.", "en": "Of course. Thank you."}]}, {"situation": "공제 내역 문의", "lines": [{"speaker": "직원", "kr": "이번 달 급여 명세서에 이 항목이 뭔지 잘 모르겠어서요.", "en": "I'm not sure what this item on my pay stub is for."}, {"speaker": "담당자", "kr": "어느 항목을 말씀하시는 건가요?", "en": "Which line item are you referring to?"}, {"speaker": "직원", "kr": "건강보험료가 갑자기 올랐어요.", "en": "My health insurance premium went up suddenly."}, {"speaker": "담당자", "kr": "올해부터 보험료율이 변경됐어요. 전 직원에게 동일하게 적용돼요.", "en": "The premium rate changed this year. It applies to all employees."}, {"speaker": "직원", "kr": "아, 그렇군요. 공지를 못 봤네요.", "en": "I see. I must have missed the notice."}]}, {"situation": "연차 신청", "lines": [{"speaker": "직원", "kr": "연차 신청하고 싶은데요, 제 잔여 일수가 몇 일인가요?", "en": "I'd like to take some time off. How many vacation days do I have left?"}, {"speaker": "담당자", "kr": "잠깐만요, 확인해 드릴게요. 현재 5일 남아 있어요.", "en": "Let me check. You currently have 5 days remaining."}, {"speaker": "직원", "kr": "다음 주 목요일부터 금요일까지 2일 쓰고 싶어요.", "en": "I'd like to take Thursday and Friday of next week off."}, {"speaker": "담당자", "kr": "시스템에서 신청하시면 팀장님 승인 후 확정돼요.", "en": "Please submit it through the system, and it'll be confirmed once your manager approves it."}, {"speaker": "직원", "kr": "알겠습니다, 바로 신청할게요.", "en": "Got it. I'll submit it right away."}]}, {"situation": "퇴직금 문의", "lines": [{"speaker": "직원", "kr": "이번 달 말에 퇴사하는데 퇴직금은 어떻게 받나요?", "en": "I'm leaving at the end of this month. How do I receive my severance pay?"}, {"speaker": "담당자", "kr": "마지막 근무일로부터 14일 이내에 계좌로 입금돼요.", "en": "It will be deposited into your account within 14 days of your last working day."}, {"speaker": "직원", "kr": "IRP 계좌로 받아야 하나요?", "en": "Do I need to receive it through an IRP account?"}, {"speaker": "담당자", "kr": "55세 미만이시면 IRP 계좌로 받으셔야 해요.", "en": "If you're under 55, it needs to go to an IRP account."}, {"speaker": "직원", "kr": "아직 IRP 계좌가 없는데 만들어야 하나요?", "en": "I don't have an IRP account yet. Do I need to open one?"}, {"speaker": "담당자", "kr": "네, 은행이나 증권사에서 만드실 수 있어요. 계좌 정보 알려주시면 처리해 드릴게요.", "en": "Yes, you can open one at a bank or brokerage. Just share the account info and we'll take care of the rest."}]}, {"situation": "육아휴직 신청 상담", "lines": [{"speaker": "직원", "kr": "육아휴직 신청하고 싶은데 어떻게 하면 되나요?", "en": "I'd like to apply for parental leave. What do I need to do?"}, {"speaker": "담당자", "kr": "출산 예정일 30일 전까지 신청서 제출하셔야 해요.", "en": "You'll need to submit the application at least 30 days before your due date."}, {"speaker": "직원", "kr": "급여는 어떻게 되나요?", "en": "What happens to my salary during leave?"}, {"speaker": "담당자", "kr": "육아휴직 급여는 고용보험에서 지급돼요. 통상임금의 80%가 지급됩니다.", "en": "Parental leave pay comes from employment insurance. You'll receive 80% of your regular wage."}, {"speaker": "직원", "kr": "최대 얼마나 받을 수 있나요?", "en": "What's the maximum I can receive?"}, {"speaker": "담당자", "kr": "월 최대 150만원까지 받으실 수 있어요.", "en": "The maximum is 1.5 million won per month."}]}, {"situation": "이메일로 오류 보고", "lines": [{"speaker": "직원 (이메일)", "kr": "이번 달 급여 명세서를 확인했는데 야근 수당이 누락된 것 같습니다.", "en": "I reviewed my pay stub for this month and it seems like my overtime pay is missing."}, {"speaker": "직원 (이메일)", "kr": "지난달에 15시간 초과 근무를 했는데 반영이 안 됐어요.", "en": "I worked 15 hours of overtime last month, but it doesn't appear to be reflected."}, {"speaker": "담당자 (이메일)", "kr": "불편을 드려서 죄송합니다. 바로 확인해 보겠습니다.", "en": "I apologize for the inconvenience. I'll look into this right away."}, {"speaker": "담당자 (이메일)", "kr": "근태 기록 확인 결과, 말씀하신 시간이 맞습니다. 다음 급여에 반영해 드리겠습니다.", "en": "After reviewing the timesheet, your hours are correct. We'll have it included in your next paycheck."}, {"speaker": "직원 (이메일)", "kr": "빠른 처리 감사합니다.", "en": "Thank you for the quick response."}]}];

function setMode(m){
  mode=m;
  document.getElementById('secFlash').style.display=m==='flash'?'block':'none';
  document.getElementById('secEmail').style.display=m==='email'?'block':'none';
  document.getElementById('secDialog').style.display=m==='dialog'?'block':'none';
  document.getElementById('mFlash').className='tib'+(m==='flash'?' on':'');
  document.getElementById('mEmail').className='tib'+(m==='email'?' on':'');
  document.getElementById('mDialog').className='tib'+(m==='dialog'?' on':'');
  if(m==='flash')showFC();else if(m==='email')showEmail();else showDialog();
}
document.getElementById('mFlash').addEventListener('click',function(){setMode('flash');});
document.getElementById('mEmail').addEventListener('click',function(){setMode('email');});
document.getElementById('mDialog').addEventListener('click',function(){setMode('dialog');});
function showFC(){
  var c=FC[fi%FC.length];
  document.getElementById('fcBadge').textContent=c.category;
  document.getElementById('fcNum').textContent=(fi%FC.length+1)+' / '+FC.length;
  document.getElementById('fcKr').textContent=c.kr;
  document.getElementById('fcEn').textContent=c.en;
  document.getElementById('fcEn').className='cen';
  document.getElementById('flipBtn').style.display='block';
  document.getElementById('fcNav').style.display='none';
  document.getElementById('pf').style.width=Math.round(((fi%FC.length)/FC.length)*100)+'%';
}
document.getElementById('flipBtn').addEventListener('click',function(){
  document.getElementById('fcEn').className='cen show';
  document.getElementById('flipBtn').style.display='none';
  document.getElementById('fcNav').style.display='flex';
});
document.getElementById('btnWrong').addEventListener('click',function(){st.tot++;save();fi++;showFC();});
document.getElementById('btnRight').addEventListener('click',function(){st.tot++;st.ok++;save();fi++;showFC();});
function showEmail(){
  var e=EMAILS[ei];
  document.getElementById('eSit').textContent='📧 '+e.situation;
  document.getElementById('eSubj').textContent='제목: '+e.subject;
  document.getElementById('eBody').textContent=e.body;
  document.getElementById('ePhrases').innerHTML=e.key_phrases.map(function(p){return '<span class="etag">'+p+'</span>';}).join('');
  document.getElementById('pf').style.width=Math.round((ei/EMAILS.length)*100)+'%';
}
document.getElementById('ePrev').addEventListener('click',function(){ei=Math.max(0,ei-1);showEmail();});
document.getElementById('eNext').addEventListener('click',function(){ei=(ei+1)%EMAILS.length;showEmail();});
function showDialog(){
  var d=DIALOGS[di];
  document.getElementById('dSit').textContent='💬 '+d.situation;
  document.getElementById('dBody').innerHTML=d.lines.map(function(l){
    return '<div class="dline"><div class="dspk">'+l.speaker+'</div><div class="dkr">'+l.kr+'</div><div class="den blr">'+l.en+'</div></div>';
  }).join('');
  document.getElementById('rvBtn').style.display='block';
  document.getElementById('pf').style.width=Math.round((di/DIALOGS.length)*100)+'%';
  document.querySelectorAll('.den').forEach(function(el){
    el.addEventListener('click',function(){el.classList.remove('blr');});
  });
}
document.getElementById('rvBtn').addEventListener('click',function(){
  document.querySelectorAll('.den').forEach(function(el){el.classList.remove('blr');});
  document.getElementById('rvBtn').style.display='none';
});
document.getElementById('dPrev').addEventListener('click',function(){di=Math.max(0,di-1);showDialog();});
document.getElementById('dNext').addEventListener('click',function(){di=(di+1)%DIALOGS.length;showDialog();});
document.getElementById('tabLearn').addEventListener('click',function(){
  document.getElementById('pgLearn').classList.add('active');
  document.getElementById('pgStats').classList.remove('active');
  document.getElementById('tabLearn').classList.add('on');
  document.getElementById('tabStats').classList.remove('on');
});
document.getElementById('tabStats').addEventListener('click',function(){
  document.getElementById('pgLearn').classList.remove('active');
  document.getElementById('pgStats').classList.add('active');
  document.getElementById('tabLearn').classList.remove('on');
  document.getElementById('tabStats').classList.add('on');
  document.getElementById('stOk').textContent=st.ok;
  document.getElementById('stTot').textContent=st.tot;
  document.getElementById('stPct').textContent=st.tot?Math.round((st.ok/st.tot)*100)+'%':'0%';
});
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
</script>
</body>
</html>
