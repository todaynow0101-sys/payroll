<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#059669">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="페이롤영어">
<title>페이롤 영어</title>
<style>
:root{--gr:#059669;--gr-light:#ecfdf5;--gr-mid:#a7f3d0;--gr-dark:#047857;--text:#1a1a1a;--muted:#6b7280;--hint:#9ca3af;--bg:#f9fafb;--card:#fff;--radius:20px;--rsm:12px;--nav:60px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overscroll-behavior:none}
.app{max-width:430px;margin:0 auto;padding:0 20px calc(var(--nav) + env(safe-area-inset-bottom) + 20px)}
.page{display:none}.page.active{display:block}
.header{padding:calc(env(safe-area-inset-top)+18px) 0 16px}
.header h1{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.header p{font-size:13px;color:var(--muted);margin-top:3px}
.tabs-inner{display:flex;gap:6px;margin-bottom:16px;background:#f3f4f6;border-radius:12px;padding:4px}
.tab-inner-btn{flex:1;padding:8px;border:none;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;background:none;color:var(--muted)}
.tab-inner-btn.active{background:white;color:var(--gr-dark);box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.progress-bar{height:4px;background:#e5e7eb;border-radius:2px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:var(--gr);border-radius:2px;transition:width 0.3s}
/* 플래시카드 */
.card{background:var(--card);border-radius:var(--radius);padding:24px 22px;margin-bottom:14px;border:1px solid #e5e7eb}
.card-badge{display:inline-block;background:var(--gr-light);color:var(--gr-dark);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;margin-bottom:12px}
.card-num{font-size:12px;color:var(--hint);margin-bottom:8px}
.card-kr{font-size:19px;font-weight:700;line-height:1.4;margin-bottom:12px}
.card-en{font-size:16px;color:var(--gr-dark);font-weight:600;line-height:1.5;display:none;background:var(--gr-light);padding:12px 14px;border-radius:var(--rsm)}
.card-en.show{display:block}
.flip-btn{width:100%;padding:13px;background:var(--gr);color:white;border:none;border-radius:var(--rsm);font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px}
.nav-row{display:flex;gap:8px}
.nav-btn{flex:1;padding:11px;border:1.5px solid #e5e7eb;background:white;border-radius:var(--rsm);font-size:13px;font-weight:600;cursor:pointer;color:var(--muted)}
.nav-btn.correct{border-color:#10b981;color:#10b981}
.nav-btn.wrong{border-color:#ef4444;color:#ef4444}
/* 이메일 */
.email-card{background:white;border:1px solid #e5e7eb;border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.email-header{padding:16px 18px;background:var(--gr-light);border-bottom:1px solid var(--gr-mid)}
.email-situation{font-size:12px;color:var(--gr-dark);font-weight:600;margin-bottom:4px}
.email-subject{font-size:15px;font-weight:700;color:var(--text)}
.email-body{padding:16px 18px;font-size:13px;line-height:1.8;color:var(--text);white-space:pre-line;font-family:monospace}
.phrases-section{padding:12px 18px;border-top:1px solid #f3f4f6}
.phrases-title{font-size:11px;font-weight:600;color:var(--gr-dark);margin-bottom:8px}
.phrase-tag{display:inline-block;background:var(--gr-light);color:var(--gr-dark);font-size:12px;padding:4px 10px;border-radius:20px;margin:3px 3px 3px 0;font-style:italic}
.email-nav{display:flex;gap:8px;padding:12px 18px;border-top:1px solid #f3f4f6}
.email-nav button{flex:1;padding:10px;border:1.5px solid #e5e7eb;background:white;border-radius:var(--rsm);font-size:13px;font-weight:600;cursor:pointer;color:var(--muted)}
/* 대화 */
.dialog-card{background:white;border:1px solid #e5e7eb;border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.dialog-header{padding:14px 18px;background:#f8fafc;border-bottom:1px solid #e5e7eb}
.dialog-situation{font-size:13px;font-weight:700;color:var(--text)}
.dialog-body{padding:14px 18px}
.dialog-line{margin-bottom:14px}
.dialog-speaker{font-size:11px;font-weight:700;color:var(--gr-dark);margin-bottom:4px}
.dialog-kr{font-size:14px;color:var(--muted);margin-bottom:3px}
.dialog-en{font-size:15px;font-weight:600;color:var(--text);line-height:1.4}
.dialog-en.hidden{filter:blur(4px);cursor:pointer;user-select:none}
.reveal-btn{width:100%;padding:11px;border:1.5px solid var(--gr);background:var(--gr-light);color:var(--gr-dark);border-radius:var(--rsm);font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}
.dialog-nav{display:flex;gap:8px;padding:0 18px 14px}
.dialog-nav button{flex:1;padding:10px;border:1.5px solid #e5e7eb;background:white;border-radius:var(--rsm);font-size:13px;font-weight:600;cursor:pointer;color:var(--muted)}
/* stats */
.stats-row{display:flex;gap:10px;margin-bottom:20px}
.stat-card{flex:1;background:white;border:1px solid #e5e7eb;border-radius:var(--rsm);padding:14px;text-align:center}
.stat-num{font-size:24px;font-weight:800;color:var(--gr)}
.stat-label{font-size:11px;color:var(--hint);margin-top:2px}
.tab-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:white;border-top:1px solid #e5e7eb;display:flex;height:var(--nav);padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;cursor:pointer;font-size:10px;font-weight:500;color:var(--hint)}
.tab-btn .ti{font-size:22px}
.tab-btn.active{color:var(--gr)}
.toast{position:fixed;bottom:calc(var(--nav) + env(safe-area-inset-bottom) + 12px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:white;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="page active" id="pageLearn">
    <div class="header">
      <h1>페이롤 영어 💼</h1>
      <p>급여 실무 영어 완전 정복</p>
    </div>
    <div class="tabs-inner">
      <button class="tab-inner-btn active" id="modeFlash" onclick="setMode('flash')">용어 카드</button>
      <button class="tab-inner-btn" id="modeEmail" onclick="setMode('email')">이메일</button>
      <button class="tab-inner-btn" id="modeDialog" onclick="setMode('dialog')">대화</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <!-- 플래시카드 -->
    <div id="flashMode">
      <div class="card">
        <div class="card-badge" id="flashBadge"></div>
        <div class="card-num" id="flashNum"></div>
        <div class="card-kr" id="flashKr"></div>
        <div class="card-en" id="flashEn"></div>
        <div style="margin-top:16px">
          <button class="flip-btn" id="flipBtn" onclick="flip()">영어로 보기 👆</button>
          <div class="nav-row" id="flashNav" style="display:none">
            <button class="nav-btn wrong" onclick="next(false)">❌ 몰랐어</button>
            <button class="nav-btn correct" onclick="next(true)">✅ 알았어</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 이메일 -->
    <div id="emailMode" style="display:none">
      <div class="email-card">
        <div class="email-header">
          <div class="email-situation" id="emailSit"></div>
          <div class="email-subject" id="emailSubj"></div>
        </div>
        <div class="email-body" id="emailBody"></div>
        <div class="phrases-section">
          <div class="phrases-title">🔑 핵심 표현</div>
          <div id="emailPhrases"></div>
        </div>
        <div class="email-nav">
          <button onclick="prevEmail()">← 이전</button>
          <button onclick="nextEmail()">다음 →</button>
        </div>
      </div>
    </div>

    <!-- 대화 -->
    <div id="dialogMode" style="display:none">
      <div class="dialog-card">
        <div class="dialog-header">
          <div class="dialog-situation" id="dialogSit"></div>
        </div>
        <div class="dialog-body" id="dialogBody"></div>
        <button class="reveal-btn" id="revealBtn" onclick="revealAll()" style="margin:0 18px 12px">영어 보기 👁</button>
        <div class="dialog-nav">
          <button onclick="prevDialog()">← 이전</button>
          <button onclick="nextDialog()">다음 →</button>
        </div>
      </div>
    </div>
  </div>

  <div class="page" id="pageStats">
    <div class="header"><h1>내 기록 📊</h1></div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="statCorrect">0</div><div class="stat-label">맞힌 수</div></div>
      <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">푼 문제</div></div>
      <div class="stat-card"><div class="stat-num" id="statRate">0%</div><div class="stat-label">정답률</div></div>
    </div>
    <div style="background:white;border:1px solid #e5e7eb;border-radius:var(--rsm);padding:16px">
      <div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px">학습 팁</div>
      <div style="font-size:13px;color:var(--text);line-height:1.7">용어 카드로 기본 개념을 익히고,<br>이메일에서 실제 문장을 익히고,<br>대화에서 자연스러운 표현을 연습해봐. 매일 조금씩!</div>
    </div>
  </div>
</div>

<nav class="tab-nav">
  <button class="tab-btn active" id="tabLearn" data-tab="learn"><span class="ti">📖</span>학습</button>
  <button class="tab-btn" id="tabStats" data-tab="stats"><span class="ti">📊</span>기록</button>
</nav>
<div class="toast" id="toast"></div>

var DIALOGS=[{"situation": "급여 문의 전화", "lines": [{"speaker": "직원", "kr": "이번 달 급여가 평소보다 적게 들어온 것 같아서요.", "en": "It looks like my paycheck this month is lower than usual."}, {"speaker": "담당자", "kr": "잠깐만요, 확인해 드릴게요.", "en": "Let me pull that up for you."}, {"speaker": "담당자", "kr": "아, 이번 달에 결근 처리가 돼서 그 부분이 공제됐네요.", "en": "Ah, it looks like an absence was recorded, so that amount was deducted."}, {"speaker": "직원", "kr": "그게 실수인 것 같은데요, 저 그날 재택근무했거든요.", "en": "I think that might be a mistake — I was working from home that day."}, {"speaker": "담당자", "kr": "알겠습니다. 확인 후 다음 급여에 반영해 드리겠습니다.", "en": "Got it. I'll look into it and have it corrected in the next payroll."}]}, {"situation": "신입 직원 급여 안내", "lines": [{"speaker": "담당자", "kr": "저희 급여일은 매월 25일이에요.", "en": "Our payday is the 25th of every month."}, {"speaker": "신입", "kr": "첫 달도 25일에 나오나요?", "en": "Will I get paid on the 25th for my first month too?"}, {"speaker": "담당자", "kr": "네, 입사일 기준으로 일할 계산해서 드려요.", "en": "Yes, it'll be prorated based on your start date."}, {"speaker": "신입", "kr": "급여 명세서는 어떻게 받아요?", "en": "How do I receive my pay stub?"}, {"speaker": "담당자", "kr": "이메일로 보내드리고, 사내 포털에서도 확인 가능해요.", "en": "We'll send it by email, and you can also access it on the company portal."}]}, {"situation": "연봉 협상", "lines": [{"speaker": "직원", "kr": "연봉 조정 관련해서 말씀드리고 싶어서요.", "en": "I'd like to discuss a salary adjustment."}, {"speaker": "담당자", "kr": "물론이죠, 어떤 부분을 염두에 두고 계신가요?", "en": "Of course. What did you have in mind?"}, {"speaker": "직원", "kr": "지난 1년간 성과를 고려해서 10% 인상을 요청드리고 싶습니다.", "en": "Given my performance over the past year, I'd like to request a 10% increase."}, {"speaker": "담당자", "kr": "검토해 보고 답변 드릴게요. 일주일 정도 시간 주실 수 있나요?", "en": "Let me review it and get back to you. Can you give me about a week?"}, {"speaker": "직원", "kr": "물론입니다. 감사합니다.", "en": "Of course. Thank you."}]}, {"situation": "공제 내역 문의", "lines": [{"speaker": "직원", "kr": "이번 달 급여 명세서에 이 항목이 뭔지 잘 모르겠어서요.", "en": "I'm not sure what this item on my pay stub is for."}, {"speaker": "담당자", "kr": "어느 항목을 말씀하시는 건가요?", "en": "Which line item are you referring to?"}, {"speaker": "직원", "kr": "건강보험료가 갑자기 올랐어요.", "en": "My health insurance premium went up suddenly."}, {"speaker": "담당자", "kr": "올해부터 보험료율이 변경됐어요. 전 직원에게 적용됩니다.", "en": "The premium rate changed this year. It applies to all employees."}, {"speaker": "직원", "kr": "아, 그렇군요. 공지를 못 봤네요.", "en": "Ah, I see. I must have missed the notice."}]}];

var KEY='eng_pay_v1';
var stats=(function(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){return{}}})();
if(!stats.correct)stats.correct=0;
if(!stats.total)stats.total=0;
function saveStats(){try{localStorage.setItem(KEY,JSON.stringify(stats))}catch(e){}}

var mode='flash';
var flashIdx=0,flipped=false;
var emailIdx=0,dialogIdx=0;
var cards=FC.slice();
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}}
shuffle(cards);

function setMode(m){
  mode=m;
  ['flash','email','dialog'].forEach(function(x){
    document.getElementById(x+'Mode').style.display=x===m?'block':'none';
    document.getElementById('mode'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active',x===m);
  });
  if(m==='flash')showFlash();
  else if(m==='email')showEmail();
  else showDialog();
}

function showFlash(){
  var c=cards[flashIdx%cards.length];
  flipped=false;
  document.getElementById('flashBadge').textContent=c.category;
  document.getElementById('flashNum').textContent=(flashIdx%cards.length+1)+' / '+cards.length;
  document.getElementById('flashKr').textContent=c.kr;
  document.getElementById('flashEn').textContent=c.en;
  document.getElementById('flashEn').classList.remove('show');
  document.getElementById('flipBtn').textContent='영어로 보기 👆';
  document.getElementById('flipBtn').style.display='block';
  document.getElementById('flashNav').style.display='none';
  document.getElementById('progressFill').style.width=Math.round(((flashIdx%cards.length)/cards.length)*100)+'%';
}
function flip(){
  document.getElementById('flashEn').classList.add('show');
  document.getElementById('flipBtn').style.display='none';
  document.getElementById('flashNav').style.display='flex';
}
function next(ok){stats.total++;if(ok)stats.correct++;saveStats();flashIdx++;showFlash();}

function showEmail(){
  var e=EMAILS[emailIdx];
  document.getElementById('emailSit').textContent='📧 '+e.situation;
  document.getElementById('emailSubj').textContent='제목: '+e.subject;
  document.getElementById('emailBody').textContent=e.body;
  document.getElementById('emailPhrases').innerHTML=e.key_phrases.map(function(p){return '<span class="phrase-tag">'+p+'</span>';}).join('');
  document.getElementById('progressFill').style.width=Math.round(((emailIdx)/EMAILS.length)*100)+'%';
}
function prevEmail(){emailIdx=Math.max(0,emailIdx-1);showEmail();}
function nextEmail(){emailIdx=(emailIdx+1)%EMAILS.length;showEmail();}

function showDialog(){
  var d=DIALOGS[dialogIdx];
  document.getElementById('dialogSit').textContent='💬 '+d.situation;
  var body=document.getElementById('dialogBody');
  body.innerHTML=d.lines.map(function(l){
    return '<div class="dialog-line"><div class="dialog-speaker">'+l.speaker+'</div><div class="dialog-kr">'+l.kr+'</div><div class="dialog-en hidden" onclick="this.classList.remove('hidden')">'+l.en+'</div></div>';
  }).join('');
  document.getElementById('revealBtn').style.display='block';
  document.getElementById('progressFill').style.width=Math.round(((dialogIdx)/DIALOGS.length)*100)+'%';
}
function revealAll(){
  document.querySelectorAll('.dialog-en').forEach(function(el){el.classList.remove('hidden');});
  document.getElementById('revealBtn').style.display='none';
}
function prevDialog(){dialogIdx=Math.max(0,dialogIdx-1);showDialog();}
function nextDialog(){dialogIdx=(dialogIdx+1)%DIALOGS.length;showDialog();}

document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click',function(){switchTab(btn.dataset.tab);});
});
function switchTab(tab){
  ['learn','stats'].forEach(function(t){
    document.getElementById('page'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active',t===tab);
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active',t===tab);
  });
  if(tab==='stats'){
    document.getElementById('statCorrect').textContent=stats.correct;
    document.getElementById('statTotal').textContent=stats.total;
    document.getElementById('statRate').textContent=stats.total?Math.round((stats.correct/stats.total)*100)+'%':'0%';
  }
}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}

showFlash();
</script>
</body>
</html>
